server.port=8080
btsss.app.storage=${BTSSS_APP_STORAGE:local}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/btsss}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

app.admin.username=${ADMIN_USERNAME}
app.admin.password=${ADMIN_PASSWORD}
app.admin.email=${ADMIN_EMAIL}

btsss.app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
btsss.app.cloudinary.api-key=${CLOUDINARY_API_KEY:}
btsss.app.cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

btsss.app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8081}

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}

btsss.app.jwtSecret=${BTSSS_APP_JWTSECRET}
btsss.app.jwtExpirationMs=${BTSSS_APP_JWTEXPIRATIONMS:86400000}

spring.servlet.multipart.max-file-size=1GB
spring.servlet.multipart.max-request-size=1GB
